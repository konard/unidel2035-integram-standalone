    var p = new URLSearchParams(location.search);
    var db    = p.get('db') || localStorage.getItem('_db') || '';
    var xsrf  = localStorage.getItem(db+'_xsrf')   || '';
    var token = localStorage.getItem(db+'_token')  || '';
    var uid   = localStorage.getItem(db+'_userId') || '';
    var user  = localStorage.getItem(db+'_user')   || '';
    var id    = '', action = '', menu = [];
    function byId(i){return document.getElementById(i);}
    function getCookie(n){var m=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return m?decodeURIComponent(m[2]):null;}
    function t9n(s){var locale=getCookie(db+'_locale')||'RU';var m=s.match('\\['+locale+'\\]([^\\[]+)');return m?m[1]:s.replace(/\[[A-Z]+\]/g,'').trim();}
    if (!token) location.href = 'login.html?db='+encodeURIComponent(db);
  </script>
  <script src="/js/js.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

<!-- Change password modal -->
<div class="cp-form" style="display:none;position:absolute;top:0;left:0;height:100%;width:100%;z-index:9999;background:rgba(255,255,255,.5);" onclick="$(this).hide()">
  <div class="middle" style="display:table-cell;vertical-align:middle" onkeyup="if(event.keyCode===13)changePwd()">
    <div class="inner p-4 shadow" style="margin:auto;border:1px solid gray;border-radius:3px;background-color:#fbfbfb;max-width:348px" onclick="event.stopPropagation()">
      <div class="w-100 text-center mb-3"><h5><t9n>[RU]Смена пароля[EN]Password change</t9n></h5></div>
      <div id="pwdchangemsg" class="alert w-100" style="display:none"></div>
      <label for="old-pwd" class="mb-0"><t9n>[RU]Действующий пароль[EN]Current password</t9n></label>
      <input type="password" id="old-pwd" class="form-control pr-1 pl-1 mb-2" style="border:1px solid lightgray!important">
      <label for="new-pwd" class="mb-0"><t9n>[RU]Новый пароль[EN]New password</t9n></label>
      <input type="password" id="new-pwd" class="form-control pr-1 pl-1 mb-2" style="border:1px solid lightgray!important">
      <label for="new-again" class="mb-0"><t9n>[RU]Повторите пароль[EN]Repeat password</t9n></label>
      <input type="password" id="new-again" class="form-control pr-1 pl-1 mb-2" style="border:1px solid lightgray!important">
      <div class="row pt-3">
        <div class="col-12 text-center"><span><img class="wait-toggle" style="display:none" src="/i/ajax.gif"></span></div>
        <div class="col-6 pr-2 ch-toggle"><button class="btn btn-primary btn-block mr-3" type="button" onclick="changePwd()"><t9n>[RU]Сменить[EN]Change</t9n></button></div>
        <div class="col-6 pl-2 ch-toggle"><button class="btn btn-outline-secondary btn-block mr-3" type="button" onclick="$('.cp-form').hide()"><t9n>[RU]Отменить[EN]Cancel</t9n></button></div>
      </div>
    </div>
  </div>
</div>

<div class="content" id="main-content" style="margin-top:56px; padding:16px;">
  <div class="text-center text-muted py-5">
    <p><t9n>[RU]Выберите раздел в меню[EN]Select a section from the menu</t9n></p>

<FORM method="POST" id="post" action="/"><input type="hidden" name="_xsrf" id="xsrf-field" value=""></FORM>

<script src="/js/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
<script src="/js/main.js"></script>
<script>
// init page vars
byId('xsrf-field').value = xsrf;
byId('post').action = '/'+db+'/';

// fix brand link
byId('brand').href = 'main.html?db='+encodeURIComponent(db);
byId('dict-link').href = 'dict.html?db='+encodeURIComponent(db);
byId('my-account-link').href = '/my?login='+encodeURIComponent(db);

// show username
if (uid || user) byId('nav-username').textContent = user || ('uid: '+uid);

// localize
if(typeof localize === 'function') localize();

// ---- load menu from role menu (matches PHP MyRoleMenu) ----
$.getJSON('/'+db+'/?JSON', function(data) {
  var menuData = data['&main.myrolemenu'] || {};
  var hrefs = menuData.href || [];
  var names = menuData.name || [];
  menu = hrefs.map(function(h,i){return {href:h,name:names[i]||h};});
  var list = byId('navbar-list');
  $('#navlist').empty(); $('#extralist').empty();

  function toNodeHref(phpHref) {
    if (!phpHref) return '#';
    var om = phpHref.match(/^object\/(\d+)$/);
    if (om) return 'object.html?db='+encodeURIComponent(db)+'&type='+om[1]+'&up=0';
    var page = phpHref.replace(/^integram\/[^/]+\//, '').split('/')[0];
    var map = {dict:'dict.html',edit_types:'edit_types.html',sql:'sql.html',
               upload:'upload.html',smartq:'smartq.html',dir_admin:'dir_admin.html',
               report:'report.html',bi:'bi.html',welcome:'main.html',
               info:'info.html',table:'dict.html'};
    if (map[page]) return map[page]+'?db='+encodeURIComponent(db);
    if (phpHref.charAt(0)==='/') return phpHref;
    return '/'+db+'/'+phpHref;
  }

  for (var i = 0; i < hrefs.length; i++) {
    var name = names[i] || hrefs[i] || '';
    if (!name) continue;
    var li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = '<a class="nav-link" href="'+toNodeHref(hrefs[i])+'">'+name+'</a>';
    list.insertBefore(li, list.querySelector('#extralist') || null);
  }
}).fail(function(xhr) {
  if (xhr.status===401||xhr.status===403) location.href='login.html?db='+encodeURIComponent(db);
});

// Refresh xsrf every 5 min
function refreshXsrf() {
  $.getJSON('/'+db+'/xsrf?JSON', function(r) {
    if (r && (r._xsrf || r.xsrf)) {
      xsrf = r._xsrf || r.xsrf;
      localStorage.setItem(db+'_xsrf', xsrf);
      byId('xsrf-field').value = xsrf;
    }
  });
}
setInterval(refreshXsrf, 5*60*1000);

function burgerClick(btn) {
  $('#navbarSupportedContent').toggleClass('show');
}

function showChangePwd() {
  $('.cp-form').css('display','table');
  $('.ch-toggle').show();
  $('.wait-toggle').hide();
}

function changePwd(){
  if($('#old-pwd').val()===''||$('#new-pwd').val()===''||$('#new-again').val()==='')
    return changeMsg('alert-danger', t9n('[RU]Заполните все поля[EN]Please fill in the inputs'));
  $('.ch-toggle,.wait-toggle').toggle();
  var obj=new XMLHttpRequest();
  obj.open('POST','/'+db+'/auth?JSON',true);
  obj.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
  obj.onload=function(){
    $('.ch-toggle,.wait-toggle').toggle();
    var json;
    try{ json=JSON.parse(this.responseText); }
    catch(e){ changeMsg('alert-danger',this.responseText); return; }
    if(json.msg){
      if(json.msg.indexOf('[err')===-1){
        changeMsg('alert-success',json.msg);
        $('#old-pwd,#new-pwd,#new-again').val('');
      } else {
        changeMsg('alert-danger',json.msg.replace(/ ?\[.+\]/,''));
      }
      if(json.token) token=json.token;
      if(json.xsrf||json._xsrf){ xsrf=json.xsrf||json._xsrf; localStorage.setItem(db+'_xsrf',xsrf); byId('xsrf-field').value=xsrf; }
    } else {
      changeMsg('alert-danger',t9n('[RU]Неверный пароль[EN]Wrong password'));
    }
    obj.abort();
  };
  obj.send('change=1&login='+encodeURIComponent(user)+'&pwd='+encodeURIComponent($('#old-pwd').val())+'&npw1='+encodeURIComponent($('#new-pwd').val())+'&npw2='+encodeURIComponent($('#new-again').val()));
}

function changeMsg(cl,msg){
  $('#pwdchangemsg').removeClass('alert-danger').removeClass('alert-success').addClass(cl).html(msg).show().delay(4500).slideUp(400);
}

function doExit(){
  document.cookie = db+'=;Path=/;max-age=0';
  document.cookie = db+'_token=;Path=/;max-age=0';
  $.get('/'+db+'/exit', function(){
    localStorage.removeItem(db+'_token');
    localStorage.removeItem(db+'_xsrf');
    localStorage.removeItem(db+'_userId');
    localStorage.removeItem(db+'_user');
    location.href='login.html?db='+encodeURIComponent(db);
  }).fail(function(){
    localStorage.removeItem(db+'_token');
    location.href='login.html?db='+encodeURIComponent(db);
  });
}

function toggleLocale(){
  var cur = getCookie(db+'_locale')||'RU';
  var next = cur==='RU'?'EN':'RU';
  document.cookie=db+'_locale='+next+';Path=/';
  location.reload();
}

// Quest init (legacy compat)
var _qip=getCookie('_qip');
function questInit(){
  if(_qip!==undefined){
    var script=document.createElement('script');
    script.src='/download/lesson.js?'+Math.random();
    document.head.appendChild(script);
  }
}
questInit();
</script>
</body>
