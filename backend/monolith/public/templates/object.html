<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Object list</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/css.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
var p = new URLSearchParams(location.search);
var db      = p.get('db')   || (window.parent && window.parent.db) || localStorage.getItem('_db') || '';
var typeId  = p.get('type') || p.get('id') || '';
var upId    = p.get('up')   || '0';
var inIframe = (window.parent !== window);
function byId(i){return document.getElementById(i);}
function getCookie(n){var m=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return m?decodeURIComponent(m[2]):null;}
function t9n(s){var locale=getCookie(db+'_locale')||'RU';var m=s.match('\\['+locale+'\\]([^\\[]+)');return m?m[1]:s.replace(/\[[A-Z]+\]/g,'').trim();}
function escHtml(s){return String(s===null||s===undefined?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
<style>
th{font-weight:normal;position:relative;}
.table thead th{border:1px solid #dee2e6;vertical-align:middle;text-align:center;padding:2px 6px;white-space:nowrap;background:#f8f9fa;font-weight:600;}
.table td{border:1px solid #dee2e6;vertical-align:middle;padding:2px 4px;}
.fixed-td{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.data-row:hover{background-color:#fafafa;}
#topbar{background:#343a40;color:#fff;padding:4px 8px;display:flex;align-items:center;gap:8px;font-size:13px;}
#topbar a{color:#adb5bd;text-decoration:none;}
#topbar a:hover{color:#fff;}
#topbar .dbname{color:#fff;font-weight:600;}
#topbar .spacer{flex:1;}
.controls{display:flex;align-items:center;padding:3px 8px;flex-wrap:wrap;gap:4px;background:#fff;border-bottom:1px solid #dee2e6;position:sticky;top:0;z-index:10;}
.controls a{cursor:pointer;padding:3px 6px;display:inline-flex;align-items:center;gap:3px;color:#333;text-decoration:none;border-radius:3px;font-size:12px;}
.controls a:hover{background:#f0f0f0;}
.filter-row td input{width:100%;border:1px solid #ccc;padding:1px 3px;font-size:11px;}
#warn{display:none;position:sticky;top:36px;z-index:9;margin:0;border-radius:0;}
#loading-row td{text-align:center;color:#999;padding:12px;}
.edit-icon{color:#aaa;text-decoration:none;}
.edit-icon:hover{color:#333;}
</style>
</head>
<body style="margin:0;padding:0">

<div id="topbar">
  <span id="tb-dbname" class="dbname"></span>
  <span>&rsaquo;</span>
  <a id="tb-dict" href="#">Tables</a>
  <span>&rsaquo;</span>
  <span id="tb-typename" style="color:#ccc"></span>
  <span class="spacer"></span>
  <span id="tb-user" style="color:#adb5bd;font-size:11px"></span>
  <a id="tb-app" href="#" style="font-size:11px">&larr; Menu</a>
</div>

<div class="alert alert-warning mb-0" id="warn" role="alert" onclick="this.style.display='none'">
  <span id="warn-msg"></span>
</div>

<div class="controls" id="controls">
  <a id="btn-create" title="Create" onclick="addRec()">
    <svg width="14" height="14" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z" fill="#333"/></svg>
    <t9n>[RU]Добавить[EN]Create</t9n>
  </a>
  <a title="Search/Filter" onclick="toggleFilter()">
    <svg width="14" height="14" viewBox="0 0 20 20"><path d="M13.32 13.32L16.43 16.43M9.29 15C12.44 15 15 12.44 15 9.29C15 6.13 12.44 3.57 9.29 3.57C6.13 3.57 3.57 6.13 3.57 9.29C3.57 12.44 6.13 15 9.29 15Z" stroke="#333" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <t9n>[RU]Поиск[EN]Search</t9n>
  </a>
  <a id="btn-clearfilter" onclick="clearFilter()" style="display:none" title="Clear filter">
    <svg width="14" height="14" viewBox="0 0 20 20"><path d="M6 6l8 8M14 6l-8 8" stroke="#999" stroke-linecap="round" fill="none"/></svg>
    <small><t9n>[RU]Сбросить[EN]Clear</t9n></small>
  </a>
  <a title="Refresh" onclick="loadPage(0)">
    <svg width="14" height="14" viewBox="0 0 18 18"><path fill-rule="evenodd" d="M9 3.38C6.9 3.38 5.02 4.49 3.94 6.17L5.48 6.17V7.17H2.5C2.22 7.17 2 6.95 2 6.67V3.69H3V5.16C4.27 3.21 6.49 1.88 9 1.88C12.87 1.88 16 5.01 16 8.88C16 12.75 12.87 15.88 9 15.88C5.13 15.88 2 12.75 2 8.88H3C3 12.2 5.68 14.88 9 14.88C12.32 14.88 15 12.2 15 8.88C15 5.56 12.32 2.88 9 2.88L9 3.38Z" fill="#333"/></svg>
    <t9n>[RU]Обновить[EN]Refresh</t9n>
  </a>
  <div style="flex:1"></div>
  <span id="page-info" style="font-size:11px;color:#999"></span>
  <a id="btn-prev" onclick="loadPage(curOffset-pageSize)" style="display:none">&laquo;</a>
  <a id="btn-next" onclick="loadPage(curOffset+pageSize)" style="display:none">&raquo;</a>
</div>

<div style="overflow-x:auto">
  <table class="table table-sm" id="tb" style="font-size:13px;margin:0;min-width:100%">
    <thead id="tb-head"><tr></tr></thead>
    <tbody id="tb-body">
      <tr id="loading-row"><td colspan="99">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
// ---- state ----
var cols = [];          // [{id, name, base}]
var curOffset = 0;
var pageSize = 50;
var hasNext = false;
var filterVals = {};
var filterVisible = false;
var sortColId = null;
var sortDir = 1;        // 1=ASC, -1=DESC
var typeName = typeId;
var createGranted = true;
var xsrf = localStorage.getItem(db + '_xsrf') || '';

// ---- top bar setup ----
byId('tb-dbname').textContent = db;
var dictUrl = inIframe ? '#' : ('dict.html?db=' + encodeURIComponent(db));
var appUrl  = inIframe ? '#' : ('app.html?db='  + encodeURIComponent(db));
byId('tb-dict').href = dictUrl;
byId('tb-dict').textContent = t9n('[RU]Таблицы[EN]Tables');
byId('tb-app').href  = appUrl;
byId('tb-app').textContent  = t9n('[RU]\u2190 Меню[EN]\u2190 Menu');
var uname = localStorage.getItem(db + '_user') || '';
if (uname) byId('tb-user').textContent = uname;

// ---- load ----
function buildUrl(offset) {
  var url = '/' + db + '/object/' + typeId + '?JSON&LIMIT=' + (offset ? offset + ',' + pageSize : pageSize);
  if (upId && upId !== '0') url += '&F_U=' + encodeURIComponent(upId);
  for (var k in filterVals) { if (filterVals[k]) url += '&F_' + k + '=' + encodeURIComponent(filterVals[k]); }
  if (sortColId) url += '&order_val=' + encodeURIComponent(sortColId) + (sortDir === -1 ? '&desc=1' : '');
  return url;
}

function loadPage(offset) {
  if (offset < 0) offset = 0;
  curOffset = offset;
  byId('tb-body').innerHTML = '<tr id="loading-row"><td colspan="99">' + t9n('[RU]Загрузка...[EN]Loading...') + '</td></tr>';
  fetch(buildUrl(offset), {credentials: 'include'})
    .then(function(r) {
      if (r.status === 401 || r.status === 403) {
        if (!inIframe) location.href = 'login.html?db=' + encodeURIComponent(db);
        return null;
      }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;
      if (data.error) { showWarn(data.error); return; }
      renderData(data);
    })
    .catch(function(e) {
      byId('tb-body').innerHTML = '<tr><td colspan="99" class="text-danger">Error: ' + escHtml(String(e)) + '</td></tr>';
    });
}

function renderData(data) {
  // type info
  if (data.type) {
    typeName = data.type.val || typeId;
    byId('tb-typename').textContent = typeName;
    document.title = typeName;
  }

  // create permission
  var uniObj = data['&main.a.&uni_obj'] || {};
  var cg = (uniObj.create_granted || ['block'])[0];
  createGranted = (cg === 'block' || cg === '');
  byId('btn-create').style.display = createGranted ? '' : 'none';

  // Column definitions from req_order + req_type + req_base
  var reqOrder = data.req_order || [];
  var reqType  = data.req_type  || {};
  var reqBase  = data.req_base  || {};
  if (reqOrder.length > 0) {
    cols = reqOrder.map(function(id) {
      return {id: String(id), name: reqType[id] || String(id), base: reqBase[id] || 'SHORT'};
    });
  } else {
    cols = [];
  }

  // Row data from object[]
  var rows = data.object || [];
  // Cell data from reqs{rowId: {colId: val}}
  var reqs = data.reqs || {};

  renderHead();
  renderBody(rows, reqs);

  // Pagination via &no_page.lnx
  var noPage = data['&main.a.&uni_obj.&no_page'] || {};
  var lnx = (noPage.lnx || [''])[0];
  hasNext = !!(lnx && lnx !== '');
  renderPager(rows.length);
}

function renderHead() {
  var tr = document.createElement('tr');
  // edit button column
  var thEdit = document.createElement('th');
  thEdit.style.cssText = 'width:26px;padding:2px';
  tr.appendChild(thEdit);
  // val column (always first)
  var thVal = document.createElement('th');
  thVal.textContent = t9n('[RU]Название[EN]Name');
  thVal.style.cursor = 'pointer';
  if (sortColId === 'val') thVal.textContent += sortDir === 1 ? ' \u25b2' : ' \u25bc';
  thVal.addEventListener('click', function(){ sortBy('val'); });
  tr.appendChild(thVal);
  // requisite columns
  cols.forEach(function(c) {
    var th = document.createElement('th');
    th.textContent = c.name;
    th.style.cursor = 'pointer';
    th.title = c.id;
    if (sortColId === c.id) th.textContent += sortDir === 1 ? ' \u25b2' : ' \u25bc';
    th.addEventListener('click', function() { sortBy(c.id); });
    tr.appendChild(th);
  });
  byId('tb-head').innerHTML = '';
  byId('tb-head').appendChild(tr);
  if (filterVisible) appendFilterRow();
}

function appendFilterRow() {
  var tr = document.createElement('tr');
  tr.className = 'filter-row';
  tr.appendChild(document.createElement('td'));
  // val filter
  var tdV = document.createElement('td');
  tdV.innerHTML = '<input type="text" value="' + escHtml(filterVals['_val_'] || '') + '" placeholder="..." onchange="setFilter(\'_val_\',this.value)" onkeydown="if(event.key===\'Enter\')applyFilter()">';
  tr.appendChild(tdV);
  cols.forEach(function(c) {
    var td = document.createElement('td');
    td.innerHTML = '<input type="text" value="' + escHtml(filterVals[c.id] || '') + '" placeholder="..." onchange="setFilter(\'' + escHtml(String(c.id)) + '\',this.value)" onkeydown="if(event.key===\'Enter\')applyFilter()">';
    tr.appendChild(td);
  });
  byId('tb-head').appendChild(tr);
}

function renderBody(rows, reqs) {
  var tb = byId('tb-body');
  if (!rows.length) {
    tb.innerHTML = '<tr><td colspan="99" class="text-muted text-center py-3">' + t9n('[RU]Нет данных[EN]No data') + '</td></tr>';
    return;
  }
  var frag = document.createDocumentFragment();
  rows.forEach(function(row) {
    var id = row.id || row.ID || '';
    var tr = document.createElement('tr');
    tr.className = 'data-row';
    tr.id = 'row-' + id;

    var editUrl = 'edit_obj.html?db=' + encodeURIComponent(db) + '&id=' + encodeURIComponent(id) + '&up=' + encodeURIComponent(typeId);

    // Edit icon cell
    var tdEdit = document.createElement('td');
    tdEdit.style.cssText = 'width:26px;padding:2px 4px;text-align:center';
    tdEdit.innerHTML = '<a href="' + editUrl + '" class="edit-icon" title="Edit"><svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M14 1L19 6L6 19H1V14L14 1Z" stroke="#aaa" stroke-linecap="round" stroke-linejoin="round"/></svg></a>';
    tr.appendChild(tdEdit);

    // Val column
    var tdVal = document.createElement('td');
    tdVal.className = 'fixed-td';
    tdVal.style.cursor = 'pointer';
    tdVal.innerHTML = '<div title="' + escHtml(row.val || '') + '">' + escHtml(row.val || '(' + id + ')') + '</div>';
    tdVal.addEventListener('click', function() { location.href = editUrl; });
    tr.appendChild(tdVal);

    // Requisite columns
    var rowReqs = reqs[String(id)] || {};
    cols.forEach(function(c) {
      var rawVal = rowReqs[c.id];
      var display = (rawVal === null || rawVal === undefined) ? '' : String(rawVal);
      var cleanDisplay = display.replace(/<[^>]+>/g, '');
      var td = document.createElement('td');
      td.className = 'fixed-td';
      td.style.cursor = 'pointer';
      if (c.base === 'NUMBER' || c.base === 'SIGNED') td.style.textAlign = 'right';
      else if (c.base === 'DATE' || c.base === 'PWD') td.style.textAlign = 'center';
      if (display.indexOf('<A ') >= 0 || display.indexOf('<a ') >= 0) {
        td.innerHTML = '<div title="' + escHtml(cleanDisplay) + '">' + display + '</div>';
      } else {
        td.innerHTML = '<div title="' + escHtml(display) + '">' + escHtml(cleanDisplay) + '</div>';
      }
      td.addEventListener('click', function(e) { if (e.target.tagName !== 'A') location.href = editUrl; });
      tr.appendChild(td);
    });

    frag.appendChild(tr);
  });
  tb.innerHTML = '';
  tb.appendChild(frag);
}

function renderPager(rowCount) {
  var info = '';
  if (rowCount > 0) {
    info = (curOffset + 1) + '\u2013' + (curOffset + rowCount);
  }
  byId('page-info').textContent = info;
  byId('btn-prev').style.display = curOffset > 0 ? '' : 'none';
  byId('btn-next').style.display = hasNext ? '' : 'none';
}

function sortBy(colId) {
  if (sortColId === colId) sortDir = -sortDir;
  else { sortColId = colId; sortDir = 1; }
  loadPage(0);
}

function toggleFilter() {
  filterVisible = !filterVisible;
  renderHead();
  byId('btn-clearfilter').style.display = filterVisible ? '' : 'none';
}

function setFilter(colId, val) {
  if (val) filterVals[colId] = val;
  else delete filterVals[colId];
}

function applyFilter() { loadPage(0); }

function clearFilter() {
  filterVals = {}; filterVisible = false;
  byId('btn-clearfilter').style.display = 'none';
  renderHead(); loadPage(0);
}

function addRec() {
  location.href = 'edit_obj.html?db=' + encodeURIComponent(db) + '&id=new&up=' + encodeURIComponent(typeId);
}

function showWarn(msg) {
  byId('warn-msg').textContent = msg;
  byId('warn').style.display = '';
  setTimeout(function(){ byId('warn').style.display = 'none'; }, 5000);
}

// ---- init ----
loadPage(0);
</script>
</body>
</html>
