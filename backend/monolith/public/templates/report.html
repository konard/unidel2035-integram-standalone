<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/css.css">
<script>
var p = new URLSearchParams(location.search);
var db     = p.get('db')     || (window.parent && window.parent.db) || localStorage.getItem('_db') || '';
var objId  = p.get('id')     || p.get('type') || '';
var token  = localStorage.getItem(db+'_token') || '';
var xsrf   = localStorage.getItem(db+'_xsrf')  || '';
if (!token) { location.href = 'login.html?db='+encodeURIComponent(db); }
function byId(i){return document.getElementById(i);}
function getCookie(n){var m=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return m?decodeURIComponent(m[2]):null;}
function t9n(s){var locale=getCookie(db+'_locale')||'RU';var m=s.match('\\['+locale+'\\]([^\\[]+)');return m?m[1]:s.replace(/\[[A-Z]+\]/g,'').trim();}
function escHtml(s){return String(s===null||s===undefined?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="/js/js.js"></script>
<style>
body{font-family:Verdana,Tahoma,sans-serif;font-size:13px;line-height:normal;padding:2px;padding-top:58px}
.table-condensed td,.table-condensed th{padding:2px 4px!important}
#filter_row td input{font-size:11px;}
</style>
</head>
<body>
<form method="post" id="report-form" action="#">
<input type="hidden" name="_xsrf" id="xsrf-inp" value="">
<table>
  <tr>
    <td>
      &nbsp;<a href="dict.html?db=" id="home-link"><span class="glyphicon glyphicon-home"></span>&#8962;</a>&nbsp;
      <script>
      var tableToExcel=(function(){
        var uri='data:application/vnd.ms-excel;base64,',
          tmpl=('<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>{worksheet}</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--><meta http-equiv="content-type" content="text/plain; charset=UTF-8"/></head><body><table>{table}</table></body></html>'),
          base64=function(s){return window.btoa(unescape(encodeURIComponent(s)));},
          format=function(s,c){return s.replace(/{(\w+)}/g,function(m,p){return c[p];});};
        return function(table,name){
          if(!table.nodeType)table=byId(table);
          var ctx={worksheet:name||'Worksheet',table:table.innerHTML};
          window.location.href=uri+base64(format(tmpl,ctx));
        };
      })();
      </script>
      <a href="#" onclick="if(byId('refresh'))byId('refresh').style.display='none';if(byId('filter_row'))byId('report_table').deleteRow(1);tableToExcel('report_table',reportTitle);" style="border:1px solid;border-radius:5px;padding:3px;">.HTML</a>
      <a href="#" id="xlsx-link" style="border:1px solid;border-radius:5px;padding:3px;">.XLS</a>
    </td>
    <td align="center" style="padding-left:13px;padding-right:13px"><h4 id="report-title"></h4></td>
    <td align="right" class="t9n" style="padding-right:10px">
      <a href="#" title="Toggle compact" onclick="toggleCompact();return false;"><span class="glyphicon glyphicon-text-width">&#9776;</span></a>&nbsp;
      &nbsp;<a href="#" title="Toggle filter" onclick="toggleFilter();return false;"><span class="glyphicon glyphicon-filter">&#9663;</span></a>
      &nbsp;<button id="refresh" type="button" class="btn btn-default btn-xs" title="Refresh" onclick="applyFilter()" style="border:none;">&#8635;</button>
      &nbsp;<a href="#" onclick="clearFilter();return false;" title="Clear filter">&#10006;</a>&nbsp;
    </td>
  </tr>
  <tr><td colspan="3">
    <table id="report_table" class="table table-bordered"></table>
  </td></tr>
</table>
</form>

<form method="POST" id="post" action="#"><input type="hidden" name="_xsrf" id="xsrf-post" value=""></form>

<script>
byId('xsrf-inp').value = xsrf;
byId('xsrf-post').value = xsrf;
byId('home-link').href = 'dict.html?db='+encodeURIComponent(db);
byId('report-form').action = '/'+db+'/report/'+objId;

var reportTitle = '';
var filterVals = {};
var compact = getCookie('compact')==='compact';

// load XLSX if available
var xslScript = document.createElement('script');
xslScript.src = '/js/xlsx.full.min.js';
document.body.appendChild(xslScript);
byId('xlsx-link').onclick = function(){
  var t = byId('report_table');
  if(typeof XLSX!=='undefined') XLSX.writeFile(XLSX.utils.table_to_book(t),'output.xlsx');
  else alert('XLSX library not loaded');
  return false;
};

function loadReport() {
  var url = '/'+db+'/report/'+objId;
  var body = new URLSearchParams({ _xsrf: xsrf });
  for (var k in filterVals) { if(filterVals[k]!==undefined&&filterVals[k]!=='') body.append(k, filterVals[k]); }

  fetch(url, {method:'POST', credentials:'include', body:body})
    .then(function(r){
      if(r.status===401||r.status===403){location.href='login.html?db='+encodeURIComponent(db);return null;}
      return r.json();
    })
    .then(function(data){
      if(!data)return;
      renderReport(data);
    })
    .catch(function(e){
      byId('report_table').innerHTML='<tr><td class="text-danger">Error: '+escHtml(String(e))+'</td></tr>';
    });
}

function renderReport(data) {
  // data: {title, cols:[{name,id,align}], rows:[[val,...]], totals:[val,...]}
  var title = data.title||data.val||data.name||'Report';
  reportTitle = title;
  byId('report-title').textContent = title;
  document.title = title;

  var cols = data.cols||data.columns||[];
  var rows = data.rows||data.data||[];
  var totals = data.totals||data.total_row||null;

  var html = '';
  // header row
  html += '<tr style="background-color:#f9f9f9;position:sticky;top:-1px;" onclick="toggleFilter()">';
  cols.forEach(function(c){
    html += '<td align="CENTER"><b>'+escHtml(c.name||c.val||String(c))+'</b></td>';
  });
  html += '</tr>';

  // filter row (hidden by default)
  html += '<tr id="filter_row" style="display:none">';
  cols.forEach(function(c, i){
    var ckey = (c.name||String(i)).replace(/ /g,'_');
    var fr = filterVals['FR_'+ckey]||'';
    var to = filterVals['TO_'+ckey]||'';
    html += '<td style="padding:0;text-align:center">'
      + '<input type="text" name="FR_'+ckey+'" value="'+escHtml(fr)+'" size="2" id="FR_'+ckey+'" oninput="adjustInput(\'FR_'+ckey+'\')">'
      + '-<input type="text" name="TO_'+ckey+'" value="'+escHtml(to)+'" size="2" id="TO_'+ckey+'" oninput="adjustInput(\'TO_'+ckey+'\')">'
      + '</td>';
  });
  html += '</tr>';

  // data rows
  rows.forEach(function(row){
    var cells = Array.isArray(row) ? row : cols.map(function(c){return row[c.id]||row[c.name]||'';});
    html += '<tr>';
    cells.forEach(function(val, i){
      var align = (cols[i]&&cols[i].align)||'LEFT';
      html += '<td align="'+escHtml(align)+'" style="mso-number-format:\'@\'">'+escHtml(String(val===null||val===undefined?'':val))+'</td>';
    });
    html += '</tr>';
  });

  // totals row
  if (totals) {
    var tcells = Array.isArray(totals) ? totals : cols.map(function(c){return totals[c.id]||totals[c.name]||'';});
    html += '<tr>';
    tcells.forEach(function(val){
      html += '<td align="RIGHT"><b>'+escHtml(String(val===null||val===undefined?'':val))+'</b></td>';
    });
    html += '</tr>';
  }

  byId('report_table').innerHTML = html;
  if (compact) byId('report_table').classList.add('table-condensed');
}

function toggleFilter() {
  var fr = byId('filter_row');
  if (!fr) return;
  fr.style.display = (fr.style.display==='table-row') ? 'none' : 'table-row';
}

function applyFilter() {
  // collect filter inputs
  document.querySelectorAll('#filter_row input').forEach(function(inp){
    filterVals[inp.name] = inp.value;
  });
  loadReport();
}

function clearFilter() {
  filterVals = {}; loadReport();
}

function toggleCompact() {
  var t = byId('report_table');
  if (compact) { t.classList.remove('table-condensed'); compact=false; deleteCookie('compact'); }
  else { t.classList.add('table-condensed'); compact=true; setCookieR('compact','compact'); }
}

function setCookieR(name,value){ var d=new Date(); d.setTime(d.getTime()+31536000000); document.cookie=name+'='+escape(value)+'; expires='+d.toGMTString(); }
function deleteCookie(name){ var d=new Date(); d.setTime(d.getTime()-1); document.cookie=name+'=; expires='+d.toGMTString(); }
function adjustInput(id){ var el=byId(id); if(el) el.size=el.value.length+1; }

// Filter enter key
document.addEventListener('keydown', function(e){
  if(e.keyCode===13 && e.target && e.target.closest && e.target.closest('#filter_row')){
    applyFilter();
  }
});

// ---- init ----
loadReport();
</script>
<script src="/js/popper.min.js"></script>
<script src="/js/bootstrap.min.js"></script>
<script src="/js/nav.js"></script>
</body>
</html>
